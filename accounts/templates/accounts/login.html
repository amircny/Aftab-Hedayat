<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود استاد</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.15);
            padding: 34px 30px;
        }

        .title {
            margin: 0 0 8px 0;
            font-size: 34px;
            color: #111827;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 26px 0;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.8;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #f9fafb;
            font-size: 14px;
            font-family: inherit;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .error-box {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 14px;
            line-height: 1.8;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 13px 16px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 26px rgba(37, 99, 235, 0.22);
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            color: #6b7280;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="title">ورود</h1>
        <p class="subtitle">برای ورود به پنل مدیریت استاد، ایمیل و رمز عبور خود را وارد کنید.</p>

        {% if form.errors %}
            <div class="error-box">
                ایمیل یا رمز عبور اشتباه است. لطفاً دوباره تلاش کنید.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.email.id_for_label }}">ایمیل</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">رمز عبور</label>
                {{ form.password }}
            </div>

            <button type="submit" class="submit-btn">ورود به پنل</button>
        </form>

        <div class="footer-note">
            سامانه مدیریت جلسات و کلاس‌ها
        </div>
    </div>

</body>
</html>
