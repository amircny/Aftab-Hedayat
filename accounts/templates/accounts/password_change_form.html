<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تغییر رمز عبور</title>

<style>

body{
font-family:tahoma;
background:#f4f7fb;
margin:0;
}

.container{
max-width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.back{
display:block;
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>تغییر رمز عبور</h2>

<form method="post">

{% csrf_token %}

{{ form.old_password.label_tag }}
{{ form.old_password }}

{{ form.new_password1.label_tag }}
{{ form.new_password1 }}

{{ form.new_password2.label_tag }}
{{ form.new_password2 }}

<button type="submit">
ثبت تغییر رمز
</button>

</form>

<a href="{% url 'teacher_dashboard' %}" class="back">
بازگشت به داشبورد
</a>

</div>

</body>
</html>
